<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleCrypto.js Live Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/simple-crypto-js@3.0.1/dist/SimpleCrypto.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; color: #666; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; margin-top: 20px; cursor: pointer; font-size: 1em; }
        button:hover { background-color: #0056b3; }
        .output-box { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px; word-break: break-all; }
        .label-tag { font-size: 0.8em; text-transform: uppercase; color: #888; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔐 SimpleCrypto Demo</h2>
    
    <label for="secretKey">Secret Passphrase</label>
    <input type="text" id="secretKey" placeholder="e.g., my-super-secret-password" value="default-key">

    <label for="plainText">Message to Encrypt</label>
    <textarea id="plainText" rows="3" placeholder="Enter your secret message here...">Hello, World!</textarea>

    <button onclick="runCrypto()">Encrypt & Decrypt</button>

    <div class="output-box">
        <span class="label-tag">Encrypted (Ciphertext):</span>
        <div id="encryptedOutput">---</div>
    </div>

    <div class="output-box">
        <span class="label-tag">Decrypted (Back to Original):</span>
        <div id="decryptedOutput">---</div>
    </div>
</div>

<script>
    function runCrypto() {
        // 1. Get values from UI
        const password = document.getElementById('secretKey').value;
        const message = document.getElementById('plainText').value;

        if(!password || !message) {
            alert("Please provide both a key and a message!");
            return;
        }

        // 2. Initialize SimpleCrypto with the secret key
        const simpleCrypto = new SimpleCrypto(password);

        // 3. Perform Encryption
        const cipherText = simpleCrypto.encrypt(message);
        document.getElementById('encryptedOutput').innerText = cipherText;

        // 4. Perform Decryption
        const decipherText = simpleCrypto.decrypt(cipherText);
        document.getElementById('decryptedOutput').innerText = decipherText;
        
        console.log("Encryption Process Complete.");
    }
</script>

</body>
</html>
